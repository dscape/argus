name: phase2
epochs: 100
batch_size: 4
gradient_accumulation: 8
optimizer:
  type: adamw
  lr: 1.0e-4
  weight_decay: 0.05
scheduler:
  type: cosine
  warmup_steps: 2000
  min_lr: 1.0e-6
clip_grad_norm: 1.0
precision: bf16
loss_weights:
  move: 1.0
  detect: 0.5
  bbox: 1.0
  identity: 0.5
wandb:
  project: argus
  enabled: true
checkpoint:
  save_every: 5
  keep_last: 3
