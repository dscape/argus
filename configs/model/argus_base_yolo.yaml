  hidden_dim: 512
pooling:
  type: mean
  square_size: 8
square_head:
  enabled: false
  num_classes: 13
board_detector:
  num_queries: 32
  hidden_dim: 512
  num_heads: 8
  num_decoder_layers: 6
  identity_dim: 128
